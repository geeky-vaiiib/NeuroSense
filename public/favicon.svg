<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#1A7A71"/>

  <!-- Neural node mark (scaled from 40x40 to fit with 12px padding) -->
  <g transform="translate(12, 12) scale(1)">
    <!-- Pulse ring -->
    <circle cx="20" cy="20" r="9" stroke="#FFFFFF" stroke-width="0.75" fill="none" opacity="0.35"/>

    <!-- Connection line 1 — upper right -->
    <path d="M 20 20 Q 28 14 33 10" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Connection line 2 — lower left -->
    <path d="M 20 20 Q 12 26 7 30" stroke="#FFFFFF" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Connection line 3 — upper left -->
    <path d="M 20 20 Q 11 13 6 10" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Central node -->
    <circle cx="20" cy="20" r="5.5" fill="#FFFFFF"/>

    <!-- Endpoint node 1 — upper right -->
    <circle cx="33" cy="10" r="2.5" fill="#FFFFFF"/>

    <!-- Endpoint node 2 — lower left -->
    <circle cx="7" cy="30" r="2.5" fill="#FFFFFF"/>

    <!-- Endpoint node 3 — upper left -->
    <circle cx="6" cy="10" r="1.8" fill="#FFFFFF"/>
  </g>
</svg>